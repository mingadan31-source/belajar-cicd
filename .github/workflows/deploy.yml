name: Jalur Otomatisasi Deploy ke RHEL

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-to-server:
    runs-on: self-hosted  # Menggunakan runner lokal di RHEL

    steps:
    - name: 1. Ambil Kode Terbaru dari GitHub
      uses: actions/checkout@v4

    - name: 2. Bangun dan Jalankan Kontainer Docker
      run: |
        # Unduh kode index.html dan Dockerfile terbaru langsung dari repositori
        curl -sSL https://raw.githubusercontent/${{ github.repository }}/main/index.html -o index.html
        curl -sSL https://raw.githubusercontent/${{ github.repository }}/main/Dockerfile -o Dockerfile
        
        # Bangun ulang Docker Image (Gunakan sudo jika user 'olop' belum masuk grup docker)
        sudo docker build -t web-cicd-app .
        
        # Hentikan dan hapus kontainer lama jika sedang berjalan
        sudo docker stop web-cicd-container || true
        sudo docker rm web-cicd-container || true
        
        # Jalankan kontainer baru di port 8081
        sudo docker run -d --name web-cicd-container -p 8081:80 --restart always web-cicd-app
